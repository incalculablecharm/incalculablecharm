<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>@incalculablecharm</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: white;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(900px, calc(100% - 40px));
      margin: 0 auto;
      padding: 90px 0 40px;
      text-align: center;
    }

    .hero {
      padding: 30px 20px 110px;
    }

    h1 {
      margin: 0;
      font-family: "Times New Roman", Times, serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 10px 0 0;
      font-family: "Times New Roman", Times, serif;
      font-size: clamp(1.5rem, 3.5vw, 2.75rem);
      font-weight: 400;
      color: #999;
      letter-spacing: -0.03em;
    }

    .bar {
      margin: 0 auto 18px;
      padding: 3px 12px;
      border: 1px solid #aaa;
      border-radius: 7px;
      background: linear-gradient(#fafafa, #d9d9d9);
      box-shadow:
        inset 0 1px 0 white,
        0 1px 1px rgba(0, 0, 0, 0.15);

      font-size: 13px;
      font-weight: bold;
      text-align: left;
    }

    .content {
      padding: 28px 20px;
      border-top: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
    }

    .coming-soon {
      margin: 0 0 14px;
      font-family: "Times New Roman", Times, serif;
      font-size: 2rem;
      font-weight: 400;
    }

    .description {
      max-width: 520px;
      margin: 0 auto;
      font-size: 13px;
      line-height: 1.5;
    }

    footer {
      padding-top: 28px;
      font-size: 11px;
      line-height: 1.8;
    }

    a {
      color: #0000cc;
      text-decoration: underline;
    }

    .footer-links {
      margin-bottom: 10px;
    }

.banner{
    margin: 0 auto 30px;
    width: 100%;
}

.banner img{
    display:block;
    width:100%;
    height:auto;
}    

.tiny{
    font-size: 0.6em;
}
  </style>
</head>

<body>
  <div class="page">

    <section class="hero">
      <h1>@incalculablecharm.</h1>
      <p class="subtitle">The world isn't ready. Neither am I, apparently.</p>
    </section>

    <div class="banner">
    <img src="assets/blackhorse.jpg" alt="Horse">
</div>

    

    <section class="content">
      <h2 class="coming-soon">A cornucopia of motion graphics & prime living.</h2>

      <p class="description">
        ...
        <br>
       <span class="tiny">I'm still learning HTML.</span>
      </p>
    </section>

    <footer>
      <div class="footer-links">
        <a href="#">About</a> |
        <a href="#">Contact</a> |
        <a href="#">Instagram</a>
      </div>

      <div>
        Copyright © 2026 @incalculablecharm.
        <a href="#">All rights reserved.</a>
      </div>

      <div style="margin-top: 26px;">
        Powered by GitHub Pages
      </div>
    </footer>

  </div>
</body>
</html>
